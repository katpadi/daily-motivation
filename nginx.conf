server {
    listen 80;
    server_name quote.yoursite.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name quote.yoursite.com;

    # SSL — update paths to your actual cert files
    ssl_certificate     /etc/letsencrypt/live/quote.yoursite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quote.yoursite.com/privkey.pem;

    # Rate limiting — max 10 requests/minute per IP on API endpoints
    limit_req_zone $binary_remote_addr zone=motivation_api:10m rate=10r/m;

    location /api/quote {
        limit_req zone=motivation_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /quote {
        limit_req zone=motivation_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /feed.xml {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
